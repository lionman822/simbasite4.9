            quotes: {
              title: '星巴格言录',
              desc: '源自东非荒野的深刻感悟，关于自然、生命与共存。',
              items: [
                `如果你不怕人类，就更不用怕狮子。`,
                `世界上最危险的物种不是那些凶猛动物，而是人类。`,
                `野生动物都知道要与自己栖息的环境共生，但人类却在一步一步摧毁自己赖以生存的生态环境。`,
                `野生动物比我们想象的要智慧很多。`,
                `狮子捕杀食草动物，表面上看有些残忍，但实际上狮子捕杀老弱病残的倾向实际是在帮助这些食草动物提高基因质量，只有身体更壮、速度更快、反应更敏锐的动物才能够繁衍后代。`,
                `狮子吃饱了，就不会再捕猎。相比之下，人类的欲望就太多了，不仅要考虑今天，还要考虑明天，不仅要考虑自己，还要考虑传宗接代。`,
                `大部分野生动物的听觉、视觉和嗅觉都比人类要好很多。`,
                `依赖城市生活的人很难在野外生存下去。`,
                `世界和平和国际合作是保护全球生态环境的先决条件。`,
                `各国都要警惕狭隘的民族主义，这种倾向不仅有害于国家，更有害于世界。`,
                `野生动物没有护照，它们不属于哪一个国家或几个国家，它们属于世界，需要集合全球之力去保护它们。`,
                `野生动物灭绝的今天，也会是人类消亡的明天。`,
                `越了解人类，就越喜欢野生动物。`,
                `野生动物很单纯，喜欢你就离你近一点，不喜欢你就远离你。`,
                `很多人很害怕凶猛动物，但事实是多数野生动物都很害怕人类，通常不会在没有受到威胁或没有退路的情况下主动攻击人类。`,
                `与野生动物保持安全距离是与它们和谐相处的首要原则。`,
                `喂食野生动物会导致野生动物更依赖人类更容易出现骚扰和攻击人类的情况。`,
                `世界上有很多地方其实并不适合人类居住，比如很多地震带。野生动物不会被地震伤害，但人类却很容易被地震伤害，因为人类喜欢生活在钢筋混凝土木板搭建的楼房里面。`,
                `世界上任何事物都有两面性，非洲草原上的蚊子和采采蝇表面上看对人类是个威胁，但也有效阻挡了人类扩张的步伐。`,
                `任何物种的数量都不能超过大自然的承载度。在非洲草原上，狮子、花豹、猎豹、斑鬣狗、黑背豺可以有效控制食草动物的数量，避免数量过多的食草动物毁灭生个草原。`,
                `如果没有足够大的生存空间和安全的迁徙廊道，大象对森林会造成灾难性的影响。`,
                `在非洲草原上，食肉动物之间不仅是竞争的关系，其实也有合作的关系。狮子捕猎食草动物消耗的体力要远远大于抢夺斑鬣狗食物所消耗的体力，反之也是这样，斑鬣狗也依赖狮子捕猎能够分到一些食物，如果没有狮子，它们就需要自己捕猎，这样它们生存的难度会加大。`,
                `这个世界可以没有人类，但不能没有野生动物，野生动物不会污染环境，更不会发明核武器去摧毁地球。`,
                `非洲草原上为什么没有臭味，因为有完整的食物链可以有效分解动物尸体和粪便。反之，人类放牧或养猪养鸡的地方却臭气熏天，也是因为没有完整的食物链。`,
                `保护野生动物不要灭绝，不仅仅是因为它们也有生存的权利，更因为我们人类离不开野生动物。`,
                `为什么有些地方的狒狒和猴子经常会抢夺人类的食物，而纯野外的狒狒和猴子不会？原因就是喂食，被人类经常喂食的野生动物会逐渐丧失害怕人类的天性，敢于主动接近人类。`,
                `野生动物保护的关键是野生动物栖息地的保护。`,
                `野生动物保护最有效的办法是保护现有的栖息地及恢复更多以前的栖息地。`,
                `人类的扩张是野生动物栖息地不断缩小的主要原因，建立更多国家公园和其他各种形式的自然保护地是当务之急。`,
                `当地牧民能否得到稳定和可观的收入是减少放牧转化更多牧场成为自然保护地的先决条件。`,
                `食草动物里同物种的身体冲突要远远多于不同物种之间的身体冲突。`,
                `生态旅行对野生动物保护至关重要，无论是国家公园还是私人保护区都依赖于生态旅行。`,
                `没有流量控制的大众旅行对于野生动物保护是弊大于利。`,
                `牧民修筑围栏对于野生动物的迁徙造成了很严重的干扰，解决之道是租用或购买他们的土地，确保他们的收入要大于放牧的收入。`,
                `过度放牧会造成草原植被退化、水土流失、人兽冲突和生物多样性丧失，最终受害的还是牧民自己。`,
                `教育有助于改善牧民生活，教育水平越高的人越不愿意放牧，他们更愿意去城市享受现代生活。`,
                `妇女地位高低是反应一个社会是否文明的标志，妇女地位越高的地方，冲突和战争越少，人口激增的风险也越小。`,
                `任何国家都没有破坏本国生态环境的权力，因为地球上只有一个生态环境，包括陆地生态环境和海洋生态环境，各地生态环境互相影响，没有国界，任何一个地方的生态环境遭到破坏，都会影响其他地区。`,
                `保护地球生态是每个国家的责任，但大国应该负起更多的责任。`,
                `保护生态环境不应该仅仅是政府和科学家的事，也是每个公民都应该去做的事。`,
                `每个人都有自己的小家，照顾小家无可厚非，但地球环境是大家，照顾小家的同时也应该为大家做贡献，如果大家没了，何来小家？`,
                `人生短暂，世事无常，有梦想就要早点去实现，否则会后悔一辈子。`,
                `我已经实现了自己儿时的梦想，把兴趣和爱好变成自己的工作和生活，每天都很快乐，很享受这样的生活，我感觉自己是世界上最快乐的人。`,
                `很多地方本没有路，需要穿越荆棘，需要有一个人先去走一次，慢慢后面就会有人跟上，就会变成了一条坦途。`,
                `真正的朋友是关键时候站得出来挺你帮助你的人。`,
                `人生其实就是不断寻找志同道合的朋友一路同行不离不弃一起做有意义的事情的历程，我很庆幸我找到了很多这样的朋友。`
              ]

                    <p className="text-[#6B5A4D] mb-6">{t.research.desc}</p>

                    {/* 搜索栏 */}
                    <div className="relative mb-8">
                      <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <Icon name="search" size={18} className="text-[#8A7D72]" />
                      </div>
                      <input
                        type="text"
                        placeholder={t.research.searchPlaceholder}
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                        className="w-full pl-11 pr-4 py-3 rounded-lg border border-[#D8D0C0] focus:outline-none focus:ring-2 focus:ring-[#4A7A3A] focus:border-transparent bg-white text-[#3D2F25] placeholder-[#8A7D72] shadow-sm transition-shadow"
                      />
                    </div>

                    <div className="space-y-6">
                      {filteredAndSortedArticles.length > 0 ? (
                        filteredAndSortedArticles.map((article, i) => (
                          <div key={i} className="flex gap-6 bg-white p-6 rounded-lg border border-[#E8E0CE] hover:border-[#4A7A3A] transition-colors shadow-sm">
                            <div className="hidden md:flex flex-col items-center justify-center bg-[#F4EBD0] text-[#3D2F25] font-bold w-20 h-20 rounded-md shrink-0 shadow-inner">
                              {article.year}
                            </div>
                            <div>
                              <div className="text-xs font-bold tracking-wider text-[#C82333] mb-1">{article.type}</div>
                              <h3 className="text-lg font-bold text-[#3D2F25] mb-2">{article.title}</h3>
                              <p className="text-[#6B5A4D] text-sm leading-relaxed">{article.desc}</p>
                              <a 
                                href={article.link} 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="mt-3 text-[#4A7A3A] text-sm font-bold inline-flex items-center gap-1 hover:underline cursor-pointer"
                              >
                                <Icon name="book" size={14} /> {t.research.readMore}
                              </a>
                            </div>
                          </div>
                        ))
                      ) : (
                        <div className="text-center py-10 bg-white rounded-lg border border-dashed border-[#D8D0C0]">
                          <p className="text-[#6B5A4D]">{t.research.emptyText}</p>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* ================= 栏目 4: 购买电子笔记 ================= */}
                {activeTab === 'notes' && (
                  <div className="animate-fade-in space-y-8">
                     <div className="bg-[#4A7A3A] text-white p-8 rounded-xl shadow-lg relative overflow-hidden">
                       <div className="absolute -right-10 -top-10 opacity-10">
                         <Icon name="leaf" size={200} />
                       </div>
                       <h2 className="text-3xl font-bold mb-4 relative z-10">{t.notes.bannerTitle}</h2>
                       <p className="text-[#EFE8D8] max-w-2xl text-lg relative z-10 leading-relaxed">
                         {t.notes.bannerDesc}
                       </p>
                     </div>

                     <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {t.notes.items.map((note, idx) => (
                          <div key={idx} className="bg-white rounded-xl border border-[#E8E0CE] overflow-hidden flex flex-col hover:shadow-xl transition-all translate-y-0 hover:-translate-y-1">
                            <div className="p-6 flex-1 flex flex-col">
                              <h3 className="text-xl font-bold text-[#3D2F25] mb-2">{note.title}</h3>
                              <p className="text-[#6B5A4D] text-sm flex-1 mb-4">{note.desc}</p>
                              <div className="flex items-center justify-between mt-auto">
                                <span className="text-[#C82333] font-bold text-lg">{note.price}</span>
                                {note.link ? (
                                  <a href={note.link} target="_blank" rel="noopener noreferrer" className="bg-[#4A7A3A] hover:bg-[#3A602D] text-white px-4 py-2 rounded font-medium transition-colors text-sm inline-block text-center cursor-pointer">
                                    {t.notes.btnText}
                                  </a>
                                ) : (
                                  <button className="bg-[#4A7A3A] hover:bg-[#3A602D] text-white px-4 py-2 rounded font-medium transition-colors text-sm">
                                    {t.notes.btnText}
                                  </button>
                                )}
                              </div>
                            </div>
                          </div>
                        ))}
                     </div>
                  </div>
                )}

                {/* ================= 栏目 5: 推荐电影/纪录片 ================= */}
                {activeTab === 'movies' && (
                  <div className="animate-fade-in space-y-8">
                    <h2 className="text-3xl font-bold text-[#3D2F25] mb-2">{t.movies.title}</h2>
                    <p className="text-[#6B5A4D] mb-6">{t.movies.desc}</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                      {t.movies.items.map((movie, idx) => (
                        <div key={idx} className="bg-white rounded-xl border border-[#E8E0CE] overflow-hidden flex flex-col hover:shadow-xl transition-all translate-y-0 hover:-translate-y-1">
                          <div className="p-6 flex-1 flex flex-col">
                            <div className="text-xs font-bold tracking-wider text-[#C82333] mb-2">{movie.platform}</div>
                            <h3 className="text-xl font-bold text-[#3D2F25] mb-3">{movie.title}</h3>
                            <p className="text-[#6B5A4D] text-sm flex-1 leading-relaxed">{movie.desc}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* ================= 栏目 6: 推荐书籍 ================= */}
                {activeTab === 'books' && (
                  <div className="animate-fade-in space-y-8">
                    <h2 className="text-3xl font-bold text-[#3D2F25] mb-2">{t.books.title}</h2>
                    <p className="text-[#6B5A4D] mb-6">{t.books.desc}</p>

                    <div className="space-y-6">
                      {t.books.items.map((book, idx) => (
                        <div key={idx} className="flex gap-6 bg-white p-6 rounded-lg border border-[#E8E0CE] hover:border-[#4A7A3A] transition-colors shadow-sm">
                          <div className="hidden md:flex flex-col items-center justify-center bg-[#F4EBD0] text-[#4A7A3A] w-20 h-20 rounded-md shrink-0 shadow-inner">
                            <Icon name="library" size={32} />
                          </div>
                          <div>
                            <div className="text-xs font-bold tracking-wider text-[#C82333] mb-1">{book.author}</div>
                            <h3 className="text-lg font-bold text-[#3D2F25] mb-2">
                              {book.title}
                            </h3>
                            <p className="text-[#6B5A4D] text-sm leading-relaxed">{book.desc}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

              </main>

              {/* 底部强制生成信息与关注区域 */}
              <footer className="mt-12 bg-[#3D2F25] text-[#D8D0C0] pt-12 pb-8 border-t-[8px] border-[#C82333]">
                <div className="max-w-5xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-8">
                  
                  <div className="space-y-4">
                    <h3 className="text-xl font-bold text-white mb-4 border-b border-gray-600 pb-2 inline-block">{t.footer.official}</h3>
                    <p className="flex items-center gap-2"><Icon name="shield" size={16} className="text-[#4A7A3A]"/> <strong>{t.footer.publish}</strong>{t.footer.academy}</p>
                    <p className="flex items-center gap-2"><Icon name="user" size={16} className="text-[#4A7A3A]"/> <strong>{t.footer.founderLabel}</strong>{t.footer.founderName}</p>
                    <p className="text-sm mt-4 text-gray-400">{t.footer.rights}</p>
                  </div>

                  <div className="space-y-4 md:text-right">
                    <h3 className="text-xl font-bold text-white mb-4 border-b border-gray-600 pb-2 inline-block md:block md:w-max md:ml-auto">{t.footer.followTitle}</h3>
                    <ul className="space-y-3 flex flex-col md:items-end">
                      <li className="flex items-center gap-2 hover:text-white cursor-pointer transition-colors">
                        <span className="bg-[#C82333] p-1 rounded-sm"><Icon name="book-open" size={14} className="text-white" /></span>
                        {t.footer.socials[0]}
                      </li>
                      <li className="flex items-center gap-2 hover:text-white cursor-pointer transition-colors">
                        <span className="bg-[#4A7A3A] p-1 rounded-sm"><Icon name="message-circle" size={14} className="text-white" /></span>
                        {t.footer.socials[1]}
                      </li>
                      <li className="flex items-center gap-2 hover:text-white cursor-pointer transition-colors">
                        <span className="bg-[#4A7A3A] p-1 rounded-sm"><Icon name="presentation" size={14} className="text-white" /></span>
                        {t.footer.socials[2]}
                      </li>
                    </ul>
                  </div>

                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
